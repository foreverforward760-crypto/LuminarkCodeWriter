name: Docker – Build & Push Sandbox Image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - "luminark/**"
      - pyproject.toml

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/luminark-sandbox

jobs:
  build:
    name: Build Docker Sandbox
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push sandbox image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}

      - name: Tag image for local test
        if: github.event_name == 'pull_request'
        run: docker tag ${{ steps.meta.outputs.tags }} luminark-sandbox:latest

      - name: Build local test image (push events)
        if: github.event_name != 'pull_request'
        run: docker build -t luminark-sandbox:latest .

      - name: Test sandbox – direct Python (no entrypoint)
        run: |
          docker run --rm \
            --network none \
            --memory 256m \
            --cpus 0.5 \
            --entrypoint python \
            luminark-sandbox:latest \
            -c "print('Sandbox OK')"

      - name: Test sandbox – via entrypoint
        run: |
          docker run --rm \
            --network none \
            --memory 256m \
            --cpus 0.5 \
            luminark-sandbox:latest \
            python -c "print('Entrypoint OK')"
